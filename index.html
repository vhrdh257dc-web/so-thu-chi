<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ Thu Chi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f6f4;
    --card:#ffffff;
    --ink:#111827;
    --ink-soft:#6b7280;
    --ink-faint:#9ca3af;
    --line:#e7ebe8;
    --income:#16a34a;
    --income-soft:#e7f7ed;
    --expense:#e11d48;
    --expense-soft:#fdeaee;
    --accent:#4f46e5;
    --accent-soft:#eeedfe;
    --brand:#0f9d58;
    --brand-dark:#0a7d45;
    --radius:16px;
    --radius-sm:11px;
    --shadow-sm:0 1px 2px rgba(16,24,20,0.04), 0 1px 1px rgba(16,24,20,0.03);
    --shadow-md:0 4px 14px rgba(16,24,20,0.06), 0 1px 3px rgba(16,24,20,0.05);
    --shadow-lg:0 12px 28px rgba(16,24,20,0.09), 0 2px 6px rgba(16,24,20,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    background-image:radial-gradient(circle at 12% 0%, rgba(15,157,88,0.05), transparent 45%);
    color:var(--ink);
    padding:76px 14px 44px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;}
  h1{
    font-family:'Manrope','Inter',sans-serif;
    font-size:21px;
    font-weight:800;
    margin:4px 0 18px;
    letter-spacing:-0.4px;
    display:flex;align-items:center;gap:8px;
  }
  .balance-card{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#0f9d58 0%,#0c8a4d 55%,#0a7245 100%);
    border:none;
    border-radius:20px;
    padding:22px 22px 20px;
    margin-bottom:14px;
    color:#fff;
    box-shadow:0 14px 30px -10px rgba(15,157,88,0.45);
  }
  .balance-card::before{
    content:'';
    position:absolute; top:-40px; right:-40px;
    width:160px;height:160px;border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .balance-card::after{
    content:'';
    position:absolute; bottom:-60px; right:40px;
    width:130px;height:130px;border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .balance-label{font-size:12.5px;color:rgba(255,255,255,0.82);margin-bottom:4px;font-weight:500;letter-spacing:.2px;}
  .balance-value{font-family:'Manrope','Inter',sans-serif;font-size:31px;font-weight:800;letter-spacing:-0.6px;position:relative;}
  .balance-row{display:flex;gap:10px;margin-top:16px;position:relative;}
  .mini{
    flex:1;
    border-radius:12px;
    padding:11px 12px;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(2px);
  }
  .mini.income{background:rgba(255,255,255,0.16);}
  .mini.expense{background:rgba(255,255,255,0.16);}
  .mini-label{font-size:11.5px;display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.85);font-weight:500;}
  .mini.income .mini-label{color:rgba(255,255,255,0.85);}
  .mini.expense .mini-label{color:rgba(255,255,255,0.85);}
  .mini-value{font-size:16.5px;font-weight:700;margin-top:3px;color:#fff;letter-spacing:-.2px;}
  .mini.income .mini-value{color:#fff;}
  .mini.expense .mini-value{color:#fff;}
  .mini.savings{background:rgba(255,255,255,0.22);}
  .balance-row .mini{padding:10px 10px;}
  .balance-row .mini-value{font-size:14.5px;}
  .save-rate-pill{
    font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,0.22);
    padding:5px 10px;border-radius:20px;white-space:nowrap;position:relative;
    border:1px solid rgba(255,255,255,0.3);
  }

  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin:18px 0 10px;
  }
  .month-nav button{
    background:var(--card);border:1px solid var(--line);border-radius:9px;
    width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--ink);
    box-shadow:var(--shadow-sm);transition:transform .12s ease, box-shadow .12s ease;
  }
  .month-nav button:active{transform:scale(0.92);}
  .month-nav .month-label{font-weight:700;font-size:14.5px;letter-spacing:-.1px;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:17px;
    margin-bottom:14px;
    box-shadow:var(--shadow-sm);
  }
  .card h2{font-size:13.5px;font-weight:700;margin:0 0 12px;color:var(--ink);display:flex;align-items:center;gap:6px;letter-spacing:-.1px;}

  .chart-wrap{position:relative;height:220px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:12.5px;color:var(--ink-soft);}
  .legend span.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;box-shadow:0 0 0 3px rgba(0,0,0,0.03);}

  .tx-list{margin-top:4px;}
  .tx-empty{
    text-align:center;color:var(--ink-soft);font-size:14px;padding:30px 10px;
  }
  .tx-item{
    display:flex;align-items:center;gap:10px;
    padding:11px 0;border-bottom:1px solid var(--line);
    transition:background .12s ease;
  }
  .tx-item:hover{background:rgba(15,157,88,0.025);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:10px;}
  .tx-item:last-child{border-bottom:none;}
  .tx-icon{
    width:38px;height:38px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .tx-mid{flex:1;min-width:0;}
  .tx-cat{font-size:14.5px;font-weight:600;letter-spacing:-.1px;}
  .tx-note{font-size:12.5px;color:var(--ink-soft);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tx-right{text-align:right;flex-shrink:0;}
  .tx-amount{font-weight:700;font-size:14.5px;}
  .tx-amount.income{color:var(--income);}
  .tx-amount.expense{color:var(--expense);}
  .tx-date{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .tx-del{
    background:none;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;
    padding:2px 4px;margin-left:2px;line-height:1;
  }
  .tx-edit{
    background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;
    padding:2px 4px;margin-left:2px;line-height:1;
  }

  .fab{
    position:fixed;bottom:24px;right:50%;transform:translateX(260px);
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,#0f9d58,#0a7d45);color:#fff;border:none;font-size:26px;
    cursor:pointer;box-shadow:0 10px 22px -4px rgba(15,157,88,0.55);
    display:flex;align-items:center;justify-content:center;
    z-index:30;transition:transform .15s ease, box-shadow .15s ease;
  }
  .fab:active{transform:scale(0.93);}
  @media (max-width:560px){
    .fab{right:18px;transform:none;}
  }

  .tabbar{
    position:fixed;top:0;left:0;right:0;
    background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    display:flex;justify-content:center;z-index:30;
    box-shadow:0 2px 12px rgba(16,24,20,0.04);
  }
  .tabbar-inner{display:flex;width:100%;max-width:520px;overflow-x:auto;}
  .tab-btn{
    flex:1;background:none;border:none;padding:11px 2px 9px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;color:var(--ink-faint);cursor:pointer;min-width:58px;
    font-weight:500;border-bottom:2.5px solid transparent;
    transition:color .15s ease;
  }
  .tab-btn .tic{font-size:18px;transition:transform .15s ease;}
  .tab-btn.active{color:var(--brand);font-weight:700;border-bottom:2.5px solid var(--brand);}
  .tab-btn.active .tic{transform:translateY(-1px);}

  .cat-list-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:6px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);
  }
  .cat-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 0;border-bottom:1px solid var(--line);
  }
  .cat-row:last-child{border-bottom:none;}
  .cat-row .cat-ic{
    width:38px;height:38px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .cat-row .cat-info{flex:1;min-width:0;}
  .cat-row .cat-name{font-size:14.5px;font-weight:600;}
  .cat-row .cat-sum{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .cat-row .cat-total{font-size:14.5px;font-weight:700;flex-shrink:0;}
  .cat-row .cat-del{
    background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 2px;
  }
  .add-cat-card{
    background:var(--card);border:1.5px dashed var(--line);border-radius:var(--radius);
    padding:14px 16px;display:flex;gap:8px;align-items:center;margin-bottom:14px;
  }
  .add-cat-card input{flex:1;}
  .add-cat-card .ic-pick{width:54px;flex-shrink:0;text-align:center;}
  .section-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .section-toggle button{
    flex:1;padding:9px;border-radius:11px;border:1.5px solid var(--line);
    background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
    transition:all .15s ease;
  }
  .section-toggle button.active.expense{background:var(--expense-soft);border-color:var(--expense);color:var(--expense);}
  .section-toggle button.active.income{background:var(--income-soft);border-color:var(--income);color:var(--income);}
  .section-toggle button.active.accent{background:var(--brand-soft,#e7f7ed);border-color:var(--brand);color:var(--brand-dark);}

  .wallet-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
    box-shadow:var(--shadow-sm);
  }
  .wallet-ic{
    width:44px;height:44px;border-radius:13px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:19px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .wallet-info{flex:1;min-width:0;}
  .wallet-name{font-size:14.5px;font-weight:600;}
  .wallet-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .wallet-bal{font-size:16px;font-weight:700;flex-shrink:0;text-align:right;}
  .wallet-del{
    background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 0 2px 4px;
  }
  .wallet-edit{
    background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:2px 0 2px 4px;
  }
  .wallet-select{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .wallet-chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:10px;
    padding:8px 12px;font-size:13px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;
  }
  .wallet-chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600;}

  .debt-summary{display:flex;gap:10px;margin-bottom:14px;}
  .debt-sum-card{flex:1;border-radius:12px;padding:12px 14px;}
  .debt-sum-card.owe{background:var(--expense-soft);}
  .debt-sum-card.owed{background:var(--income-soft);}
  .debt-sum-label{font-size:12px;}
  .debt-sum-card.owe .debt-sum-label{color:var(--expense);}
  .debt-sum-card.owed .debt-sum-label{color:var(--income);}
  .debt-sum-value{font-size:17px;font-weight:700;margin-top:2px;}
  .debt-sum-card.owe .debt-sum-value{color:var(--expense);}
  .debt-sum-card.owed .debt-sum-value{color:var(--income);}

  .debt-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
  }
  .debt-top{display:flex;align-items:flex-start;gap:10px;}
  .debt-ic{
    width:40px;height:40px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .debt-info{flex:1;min-width:0;}
  .debt-name{font-size:14.5px;font-weight:600;}
  .debt-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .debt-del{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;flex-shrink:0;}
  .debt-progress{height:8px;border-radius:5px;background:var(--bg);margin:12px 0 6px;overflow:hidden;}
  .debt-progress-fill{height:100%;border-radius:4px;}
  .debt-nums{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);}
  .debt-nums b{color:var(--ink);font-weight:700;}
  .debt-pay-row{display:flex;gap:8px;margin-top:12px;}
  .debt-pay-row input{flex:1;}
  .debt-pay-row button{
    flex:0 0 auto;padding:0 16px;border-radius:11px;border:none;
    background:linear-gradient(135deg,#0f9d58,#0a7d45);color:#fff;font-size:13px;font-weight:700;cursor:pointer;
    box-shadow:0 4px 10px -3px rgba(15,157,88,0.5);
  }
  .debt-paid-off{opacity:0.6;}

  .fixed-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
    box-shadow:var(--shadow-sm);
  }
  .fixed-ic{
    width:40px;height:40px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);
  }
  .fixed-info{flex:1;min-width:0;}
  .fixed-name{font-size:14.5px;font-weight:600;}
  .fixed-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .fixed-amount{font-size:14.5px;font-weight:700;flex-shrink:0;text-align:right;}
  .fixed-actions{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .fixed-pay-btn{
    border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;
  }
  .fixed-pay-btn.unpaid{background:var(--expense-soft);color:var(--expense);}
  .fixed-pay-btn.paid{background:var(--income-soft);color:var(--income);}
  .fixed-log-btn{
    border:none;border-radius:8px;padding:6px 10px;font-size:11.5px;font-weight:600;cursor:pointer;
    background:var(--accent-soft);color:var(--accent);margin-top:4px;
  }
  .fixed-log-btn:disabled{background:var(--bg);color:var(--ink-soft);opacity:0.7;cursor:default;}
  .fixed-del{background:none;border:none;color:var(--ink-soft);font-size:14px;cursor:pointer;}

  .jar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .jar-item{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 10px 13px;text-align:center;position:relative;box-shadow:var(--shadow-sm);
    transition:transform .15s ease;
  }
  .jar-item:active{transform:scale(0.96);}
  .jar-emoji{font-size:26px;display:block;margin-bottom:6px;}
  .jar-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3;}
  .jar-pct{font-family:'Manrope','Inter',sans-serif;font-size:20px;font-weight:800;margin:4px 0 2px;letter-spacing:-.3px;}
  .jar-amount{font-size:11.5px;color:var(--ink-soft);}
  .jar-del{
    position:absolute;top:6px;right:6px;
    background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;padding:0;
  }
  .jar-total-row{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
    box-shadow:var(--shadow-sm);
  }
  .jar-total-row .label{font-size:13px;color:var(--ink-soft);}
  .jar-total-row .val{font-size:15px;font-weight:700;}
  .jar-total-row .val.ok{color:var(--income);}
  .jar-total-row .val.over{color:var(--expense);}
  .pct-bar{height:9px;border-radius:5px;background:var(--bg);overflow:hidden;margin-bottom:14px;box-shadow:inset 0 1px 2px rgba(0,0,0,0.05);}
  .pct-bar-fill{height:100%;border-radius:4px;transition:width .3s;}

  .jar-base-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .jar-base-toggle button{
    flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .jar-base-toggle button.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}

  .overlay{
    position:fixed;inset:0;background:rgba(10,20,15,0.42);backdrop-filter:blur(2px);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--card);width:100%;max-width:520px;
    border-radius:22px 22px 0 0;padding:22px 18px 28px;
    max-height:88vh;overflow-y:auto;
    box-shadow:0 -14px 40px rgba(16,24,20,0.18);
    position:relative;
  }
  .sheet::before{
    content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:38px;height:4px;border-radius:3px;background:var(--line);
  }
  .sheet h2{margin:6px 0 16px;font-size:17.5px;font-weight:800;font-family:'Manrope','Inter',sans-serif;letter-spacing:-.2px;}
  .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .type-toggle button{
    flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--line);
    background:var(--card);font-size:14px;font-weight:600;cursor:pointer;color:var(--ink-soft);
    transition:all .15s ease;
  }
  .type-toggle button.active.expense{background:var(--expense-soft);border-color:var(--expense);color:var(--expense);box-shadow:0 3px 8px -3px rgba(225,29,72,0.25);}
  .type-toggle button.active.income{background:var(--income-soft);border-color:var(--income);color:var(--income);box-shadow:0 3px 8px -3px rgba(22,163,74,0.25);}

  label{font-size:12px;color:var(--ink-soft);display:block;margin:14px 0 6px;font-weight:600;letter-spacing:.1px;}
  input[type=number],input[type=text],input[type=date]{
    width:100%;padding:12px 13px;border-radius:12px;border:1.5px solid var(--line);
    font-size:15px;background:var(--bg);color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=number]:focus,input[type=text]:focus,input[type=date]:focus{
    outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,157,88,0.12);background:#fff;
  }
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px;}
  .cat-btn{
    border:1.5px solid var(--line);background:var(--card);border-radius:12px;
    padding:9px 4px;font-size:11.5px;cursor:pointer;text-align:center;color:var(--ink-soft);
    transition:all .12s ease;
  }
  .cat-btn .ic{font-size:18px;display:block;margin-bottom:3px;}
  .cat-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;box-shadow:0 3px 8px -3px rgba(79,70,229,0.35);}

  .sheet-actions{display:flex;gap:10px;margin-top:22px;}
  .btn{
    flex:1;padding:14px;border-radius:13px;border:none;font-size:15px;font-weight:700;cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn.cancel{background:var(--bg);color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn.save{background:linear-gradient(135deg,#0f9d58,#0a7d45);color:#fff;box-shadow:0 8px 18px -6px rgba(15,157,88,0.55);}
  .loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:14px;}
  .money-row{display:flex;gap:8px;align-items:stretch;}
  .money-row input{flex:1;}
  .btn-000{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--bg);border-radius:12px;

function monthsBack(n){
  // trả về mảng n tháng gần nhất TRƯỚC tháng hiện tại (cũ -> mới), không gồm tháng này
  const arr = [];

  }

}

function allCats(type){

function findCat(id){

async function loadData(){
  try{
    const snap = await db.ref('sothuchu').once('value');
    const d = snap.val() || {};
    transactions   = d.transactions   ? Object.values(d.transactions)   : [];
    categories     = d.categories     ? d.categories : JSON.parse(JSON.stringify(DEFAULT_CATS));
    wallets        = d.wallets        ? Object.values(d.wallets)        : [
      { id:'cash', name:'Tiền mặt', icon:'💵', color:'#1D9E75', initialBalance:0, builtin:true },
      { id:'bank', name:'Tài khoản ngân hàng', icon:'🏦', color:'#378ADD', initialBalance:0, builtin:true },
    ];
    debts          = d.debts          ? Object.values(d.debts)          : [];
    fixedExpenses  = d.fixedExpenses  ? Object.values(d.fixedExpenses)  : [];
    savings        = d.savings        ? Object.values(d.savings)        : [];
    jars           = d.jars           ? Object.values(d.jars)           : JSON.parse(JSON.stringify(DEFAULT_JARS));
  }catch(e){
    console.error('Firebase load error', e);
    categories = JSON.parse(JSON.stringify(DEFAULT_CATS));
    jars = JSON.parse(JSON.stringify(DEFAULT_JARS));
  }
  // di dân dữ liệu cũ: thêm danh mục "Tiết kiệm/Hụi" nếu chưa có
  if(categories.expense && !categories.expense.find(c=>c.id==='tiet_kiem')){
    categories.expense.push({id:'tiet_kiem', name:'Tiết kiệm/Hụi', icon:'🐷', color:'#639922'});

    categories.income.push({id:'lay_hui', name:'Lấy hụi/Tiết kiệm', icon:'🐷', color:'#639922'});
  }
  // di dân dữ liệu tiết kiệm/hụi cũ (dạng mảng contributions/interestLog) sang mô hình số tháng
  savings.forEach(s=>{
    if(s.contributions !== undefined || s.interestLog !== undefined){
      const monthsFromArr = (s.contributions||[]).length;
      if(typeof s.monthsPaid !== 'number') s.monthsPaid = monthsFromArr;
      delete s.contributions;
      delete s.interestLog;
    }
    if(typeof s.monthsPaid !== 'number') s.monthsPaid = 0;

function findWallet(id){
  return wallets.find(w=>w.id===id) || wallets[0] || { name:'Ví', icon:'👛', color:'#888' };
}

function walletBalance(id){
  const w = findWallet(id);
  const anchor = w.balanceAsOf || '0000-01-01';
  const tx = transactions.filter(t=> (t.walletId || 'cash') === id && t.date >= anchor);
  const income = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return (w.initialBalance||0) + income - expense;
}

function monthTx(){
  const mk = monthKey(viewMonth);
  return transactions.filter(t => t.date.slice(0,7) === mk);
}

function exportReportPDF(mtx){
  mtx = mtx || [];
  const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();
  const todayVN = `${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  const periodVN = `01/${String(m+1).padStart(2,'0')}/${y} – ${String(daysInMonth).padStart(2,'0')}/${String(m+1).padStart(2,'0')}/${y}`;

  // ── tổng hợp tháng này & tháng trước ──
  const mIncome = mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExpense = mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const mSavings = mtx.filter(t=>t.type==='expense' && t.cat==='tiet_kiem').reduce((s,t)=>s+t.amount,0);
  const savingsRate = mIncome > 0 ? Math.round((mSavings/mIncome)*100) : 0;

  const prevMonthDate = new Date(y, m-1, 1);
  const pmk = monthKey(prevMonthDate);
  const ptx = transactions.filter(t=>t.date.slice(0,7)===pmk);
  const pIncome = ptx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const pExpense = ptx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const pSavings = ptx.filter(t=>t.type==='expense' && t.cat==='tiet_kiem').reduce((s,t)=>s+t.amount,0);

  const trIncome = pctTrend(mIncome, pIncome, true);
  const trExpense = pctTrend(mExpense, pExpense, false);
  const trSavings = pctTrend(mSavings, pSavings, true);
  const trendColorHex = t => t.cls==='good' ? '#16a34a' : t.cls==='bad' ? '#e11d48' : '#9ca3af';

  // ── biểu đồ theo tuần trong tháng ──
  let numWeeks = Math.floor(daysInMonth/7) || 1;
  const weekBuckets = [];
  for(let i=0;i<numWeeks;i++){
    const startDay = i*7+1;
    const endDay = (i===numWeeks-1) ? daysInMonth : (i+1)*7;
    const sK = `${y}-${String(m+1).padStart(2,'0')}-${String(startDay).padStart(2,'0')}`;
    const eK = `${y}-${String(m+1).padStart(2,'0')}-${String(endDay).padStart(2,'0')}`;
    const tx = transactions.filter(t=>t.date>=sK && t.date<=eK);
    weekBuckets.push({
      label:`Tuần ${i+1}`,
      sub:`${String(startDay).padStart(2,'0')}/${String(m+1).padStart(2,'0')} - ${String(endDay).padStart(2,'0')}/${String(m+1).padStart(2,'0')}`,
      income: tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      expense: tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
    });
  }

  // ── phân bổ chi tiêu theo danh mục ──
  const byCat = {};
  mtx.filter(t=>t.type==='expense').forEach(t=>{ byCat[t.cat] = (byCat[t.cat]||0) + t.amount; });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catRows = catEntries.map(([id,val])=>{
    const cat = findCat(id);
    const pct = mExpense ? Math.round(val/mExpense*100) : 0;
    return `<tr><td><span class="dot" style="background:${cat.color};"></span>${cat.icon} ${escapeHtml(cat.name)}</td><td class="num">${fmt(val)}</td><td class="num">${pct}%</td></tr>`;
  }).join('');

  // ── top 5 khoản chi lớn nhất ──
  const topExpenses = mtx.filter(t=>t.type==='expense').slice().sort((a,b)=>b.amount-a.amount).slice(0,5);
  const maxTopAmt = topExpenses.length ? topExpenses[0].amount : 1;
  const topExpenseRows = topExpenses.map(t=>{
    const cat = findCat(t.cat);
    const pct = mExpense ? (t.amount/mExpense*100) : 0;
    const barW = Math.max(4, Math.round(t.amount/maxTopAmt*100));
    return `<tr>
      <td><span style="font-size:14px;">${cat.icon}</span> ${escapeHtml(t.note || cat.name)}</td>
      <td>${escapeHtml(cat.name)}</td>
      <td style="min-width:120px;">
        <div style="background:#eef1ef;border-radius:5px;height:7px;overflow:hidden;margin-bottom:3px;">
          <div style="height:100%;width:${barW}%;background:${cat.color};border-radius:5px;"></div>
        </div>
      </td>
      <td class="num">${fmt(t.amount)}<div style="font-size:9.5px;color:#9ca3af;">${pct.toFixed(1)}%</div></td>
    </tr>`;
  }).join('');

  // ── chi tiết thu nhập theo danh mục ──
  const byIncomeCat = {};
  mtx.filter(t=>t.type==='income').forEach(t=>{ byIncomeCat[t.cat] = (byIncomeCat[t.cat]||0) + t.amount; });
  const incomeEntries = Object.entries(byIncomeCat).sort((a,b)=>b[1]-a[1]);
  const incomeRows = incomeEntries.map(([id,val])=>{
    const cat = findCat(id);
    const pct = mIncome ? Math.round(val/mIncome*100) : 0;
    return `<tr><td>${cat.icon} ${escapeHtml(cat.name)}</td><td class="num">${fmt(val)}</td><td class="num">${pct}%</td></tr>`;
  }).join('');

  // ── biến động số dư theo ngày trong tháng ──
  const dayLabels = [], dayNet = [];
  let running = 0;
  const dailyPoints = [];
  for(let d=1; d<=daysInMonth; d++){
    const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tx = transactions.filter(t=>t.date===key);
    const inc = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    running += (inc - exp);
    dayLabels.push(`${String(d).padStart(2,'0')}/${String(m+1).padStart(2,'0')}`);
    dailyPoints.push(running);
  }

  // ── lịch sử giao dịch gần đây ──
  const recentTx = mtx.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0,10);
  const recentRows = recentTx.map(t=>{
    const cat = findCat(t.cat);
    const d = new Date(t.date+'T00:00:00');
    const dStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    return `<tr>
      <td>${dStr}</td>
      <td>${cat.icon} ${escapeHtml(t.note || cat.name)}</td>
      <td>${escapeHtml(cat.name)}</td>
      <td class="num" style="color:${t.type==='income' ? '#16a34a' : '#e11d48'};font-weight:700;">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td>
    </tr>`;
  }).join('');

  // ── nhận xét & gợi ý ──
  const insights = [];
  if(savingsRate >= 20){
    insights.push(`Tuyệt vời! Bạn đã tiết kiệm được <b>${savingsRate}%</b> thu nhập trong tháng này, đạt mức khuyến nghị 20%.`);
  } else if(mIncome > 0){
    insights.push(`Tỷ lệ tiết kiệm tháng này là <b>${savingsRate}%</b>, hãy cố gắng đạt tối thiểu 20% để tài chính vững vàng hơn.`);
  }
  if(catEntries.length){
    const [topId, topVal] = catEntries[0];
    const topCat = findCat(topId);
    const topPct = mExpense ? Math.round(topVal/mExpense*100) : 0;

function wireThousandButtons(){
  document.querySelectorAll('.btn-000').forEach(btn=>{
    btn.onclick = ()=>{
      const inp = document.getElementById(btn.dataset.target);
      if(!inp) return;
      const cur = (inp.value||'').toString();
      inp.value = cur + '000';
      inp.dispatchEvent(new Event('input', {bubbles:true}));
      inp.focus();
    };
  });
}

function pctTrend(cur, prev, positiveIsGood){
  if(prev === 0){
    if(cur === 0) return { text:'—', cls:'flat', arrow:'' };
    return { text:'Mới', cls: positiveIsGood?'good':'bad', arrow:'' };
  }
  const pct = ((cur-prev)/Math.abs(prev))*100;
  const up = pct >= 0;
  const good = positiveIsGood ? up : !up;
  return { text:`${Math.abs(pct).toFixed(1)}%`, cls: good?'good':'bad', arrow: up?'▲':'▼' };
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderPie(mtx){
  const exp = mtx.filter(t=>t.type==='expense');
  const byCat = {};
  exp.forEach(t=>{ byCat[t.cat] = (byCat[t.cat]||0) + t.amount; });
  const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);

  const legend = document.getElementById('pieLegend');
  if(entries.length === 0){
    legend.innerHTML = `<span style="color:var(--ink-soft);">Chưa có khoản chi nào tháng này</span>`;
  } else {
    legend.innerHTML = entries.map(([id,val])=>{
      const cat = findCat(id);
      const pct = total ? Math.round(val/total*100) : 0;
      return `<span><span class="dot" style="background:${cat.color};"></span>${cat.icon} ${cat.name} ${pct}%</span>`;
    }).join('');
  }

  if(pieChart) pieChart.destroy();
  const ctx = document.getElementById('pieCanvas');
  if(entries.length === 0){
    pieChart = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:['Chưa có dữ liệu'], datasets:[{ data:[1], backgroundColor:['#e6e3da'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{enabled:false}} }
    });
    return;
  }
  pieChart = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels: entries.map(([id])=>findCat(id).name),
      datasets:[{
        data: entries.map(([,v])=>v),
        backgroundColor: entries.map(([id])=>findCat(id).color),
        borderColor: '#ffffff',
        borderWidth: 2,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: (c)=> ` ${c.label}: ${fmt(c.parsed)}` } }
      }
    }
  });
}

function renderBar(){
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(viewMonth.getFullYear(), viewMonth.getMonth()-i, 1);
    months.push(d);
  }
  const labels = months.map(d=>`Th${d.getMonth()+1}`);
  const incomeData = months.map(d=>{
    const mk = monthKey(d);
    return transactions.filter(t=>t.type==='income' && t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
  });
  const expenseData = months.map(d=>{
    const mk = monthKey(d);
    return transactions.filter(t=>t.type==='expense' && t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
  });

  if(barChart) barChart.destroy();
  const ctx = document.getElementById('barCanvas');
  barChart = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Thu', data:incomeData, backgroundColor:'#1D9E75', borderRadius:4, maxBarThickness:18 },
        { label:'Chi', data:expenseData, backgroundColor:'#D85A30', borderRadius:4, maxBarThickness:18 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{
        y:{ beginAtZero:true, ticks:{ callback:(v)=> (v/1000)+'k', color:'#898781' }, grid:{ color:'#e6e3da' } },
        x:{ grid:{ display:false }, ticks:{ color:'#898781' } }
      },
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{ label:(c)=> ` ${c.dataset.label}: ${fmt(c.parsed.y)}` } }
      }
    }
  });
}

  });

  container.innerHTML = `

      <button type="button" id="secExpense" class="expense ${catSection==='expense'?'active':''}">Khoản chi</button>

    document.getElementById('newCatIcon').textContent = icons[iconIdx];
  };

  document.getElementById('btnAddCat').onclick = async ()=>{
    const nameInput = document.getElementById('newCatName');
    const name = nameInput.value.trim();
    if(!name) { nameInput.focus(); return; }
    const palette = ['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#888780','#639922','#BA7517'];
    const color = palette[Math.floor(Math.random()*palette.length)];
    const id = 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    categories[catSection].push({ id, name, icon: icons[iconIdx], color });
    await saveCategories();
    nameInput.value = '';
    render();

  const list = document.getElementById('catList');
  if(cats.length === 0){
    list.innerHTML = `<div class="tx-empty">Chưa có mục nào.</div>`;

  }
  list.innerHTML = cats.map(c=>{

      </div>

  }).join('');

  list.querySelectorAll('.cat-del').forEach(btn=>{
    btn.onclick = async ()=>{
      if(categories[catSection].length <= 1){
        alert('Cần giữ lại ít nhất 1 danh mục.');
        return;
      }
      categories[catSection] = categories[catSection].filter(c=>c.id!==btn.dataset.id);
      await saveCategories();
      render();
    };
  });
}

function updateWalletBalance(id){
  const w = wallets.find(x=>x.id===id);
  if(!w) return;
  const input = prompt(
    `Nhập số dư ĐẦU THÁNG NÀY cho "${w.name}" (hiện tại: ${fmt(w.initialBalance||0)}):\n\nCác giao dịch thu/chi phát sinh từ đầu tháng này (kể cả những khoản đã ghi trước đó, VD lương) sẽ tự cộng/trừ thêm trên số này. Giao dịch của các tháng trước sẽ không tính lại vào số dư nữa.`,
    Math.round(w.initialBalance||0)
  );
  if(input === null) return;
  const newInitial = Math.round(parseFloat(input) || 0);
  if(isNaN(newInitial)) return;
  w.initialBalance = newInitial;
  w.balanceAsOf = firstOfMonthStr();
  saveWallets().then(render);
}

          <span>Đã trả: <b>${fmt(d.paid)}</b> / ${fmt(d.total)}</span>
          <span>${remaining<=0?'Đã xong ✓':'Còn lại: '}${remaining>0?`<b>${fmt(remaining)}</b>`:''}</span>
        </div>
        ${installmentHTML}
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.debt-del').forEach(btn=>{
    btn.onclick = async ()=>{
      debts = debts.filter(d=>d.id!==btn.dataset.id);
      await saveDebts();
      render();
    };
  });

  // regular pay
  listEl.querySelectorAll('.debt-pay-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id;
      const input = document.getElementById('pay-'+id);
      const amt = Math.round(parseFloat(input.value) || 0);
      if(amt <= 0){ input.focus(); return; }
      const d = debts.find(x=>x.id===id);
      const walletId = document.getElementById('payWallet-'+id).value;
      const applied = Math.min(amt, d.total - d.paid);
      d.paid = Math.min(d.total, d.paid + amt);
      await saveDebts();
      transactions.push({
        id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
        type: d.direction==='toi_no'?'expense':'income',
        cat:'tra_no', walletId, amount:applied, date:todayStr(),
        note:(d.direction==='toi_no'?'Trả nợ: ':'Thu nợ: ')+d.name
      });
      await saveData();
      render();
    };
  });

  // monthly installment pay
  listEl.querySelectorAll('.debt-pay-month-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id;
      const d = debts.find(x=>x.id===id);
      if(!d || (d.paidMonths||[]).includes(mk)) return;
      const walletId = document.getElementById('payWallet-'+id).value;
      const monthlyAmt = Math.ceil(d.total / d.months);
      const applied = Math.min(monthlyAmt, d.total - d.paid);
      d.paidMonths = d.paidMonths || [];
      d.paidMonths.push(mk);
      d.paid = Math.min(d.total, d.paid + applied);
      await saveDebts();
      transactions.push({
        id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
        type:'expense', cat:'tra_no', walletId, amount:applied, date:todayStr(),
        note:`Trả góp tháng ${new Date().getMonth()+1}/${new Date().getFullYear()}: `+d.name
      });
      await saveData();
      render();
    };
  });
}

async function contributeSavingMonth(id){
  const f = savings.find(x=>x.id===id);
  if(!f) return;
  if(f.monthsTotal > 0 && (f.monthsPaid||0) >= f.monthsTotal) return;
  f.monthsPaid = (f.monthsPaid||0) + 1;
  await saveSavings();
  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    type: 'expense', cat: 'tiet_kiem', walletId: f.walletId, amount: f.monthlyAmount,
    date: todayStr(),
    note: f.withdrawn
      ? `Trả góp hụi: ${f.name} (tháng ${f.monthsPaid})`
      : `Góp tiết kiệm/hụi: ${f.name} (tháng ${f.monthsPaid})`
  });
  await saveData();
  render();
}

async function withdrawSavingPlan(id){
  const f = savings.find(x=>x.id===id);
  if(!f || f.withdrawn) return;
  const monthlyAmount = f.monthlyAmount || 0;
  const interestPerMonth = Math.round(monthlyAmount * (f.interestPct||0) / 100);
  const hasTerm = (f.monthsTotal||0) > 0;
  // Lấy hụi trọn kỳ = số tiền góp/tháng * tổng số tháng + tổng lãi cả kỳ
  const suggested = hasTerm
    ? (monthlyAmount + interestPerMonth) * f.monthsTotal
    : (monthlyAmount + interestPerMonth) * (f.monthsPaid||0);

  const amtStr = prompt(`Số tiền thực nhận khi lấy hụi "${f.name}" (đ):`, suggested || 0);
  if(amtStr === null) return;
  const amount = Math.round(parseFloat(amtStr.replace(/[^0-9.-]/g,'')) || 0);
  if(amount <= 0) return;

  const wallet = findWallet(f.walletId);
  const dateStr = todayStr();

  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    type: 'income', cat: 'lay_hui', walletId: f.walletId, amount,
    date: dateStr, note: `Lấy hụi/Rút tiết kiệm: ${f.name}`
  });

  f.withdrawn = true;
  f.withdrawnAmount = amount;
  f.withdrawnDate = dateStr;

  await saveSavings();
  await saveData();
  render();
}

function editSavingPlan(id){
  const f = savings.find(x=>x.id===id);
  if(!f) return;

  const name = prompt('Tên khoản:', f.name);
  if(name === null) return;

  const amt = prompt('Số tiền đóng mỗi tháng (đ):', f.monthlyAmount);
  if(amt === null) return;

  const pct = prompt('Lãi suất mỗi tháng (%):', f.interestPct || 0);
  if(pct === null) return;

  const paid = prompt('Số tháng đã đóng:', f.monthsPaid || 0);
  if(paid === null) return;

  const total = prompt('Số tháng phải đóng (0 nếu không có kỳ hạn):', f.monthsTotal || 0);
  if(total === null) return;

  f.name = name.trim() || f.name;
  f.monthlyAmount = Math.round(parseFloat(amt) || f.monthlyAmount);
  f.interestPct = parseFloat(pct) || 0;
  f.monthsPaid = Math.max(0, Math.round(parseFloat(paid) || 0));
  f.monthsTotal = Math.max(0, Math.round(parseFloat(total) || 0));
  saveSavings().then(render);
}

  }
  listEl.innerHTML = fixedExpenses.slice().sort((a,b)=>a.dueDay-b.dueDay).map(f=>{

          ${!isPaid ? `<button class="fixed-log-btn" data-id="${f.id}">➕ Ghi vào thu chi</button>` : ''}
        </div>
        <button class="fixed-del" data-id="${f.id}" aria-label="Xoá khoản cố định">🗑</button>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.fixed-track-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const f = fixedExpenses.find(x=>x.id===btn.dataset.id);
      if(!f) return;
      f.paidMonths = f.paidMonths || [];
      if(f.paidMonths.includes(mk)) f.paidMonths = f.paidMonths.filter(m=>m!==mk);
      else f.paidMonths.push(mk);
      await saveFixedExpenses();
      render();
    };
  });

  listEl.querySelectorAll('.fixed-log-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const f = fixedExpenses.find(x=>x.id===btn.dataset.id);
      if(!f || (f.loggedMonths||[]).includes(mk)) return;
      f.loggedMonths = f.loggedMonths || [];
      f.paidMonths = f.paidMonths || [];
      f.loggedMonths.push(mk);
      if(!f.paidMonths.includes(mk)) f.paidMonths.push(mk);
      await saveFixedExpenses();

      const tx = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
        type: 'expense',
        cat: f.cat,
        walletId: f.walletId,
        amount: f.amount,
        date: todayStr(),
        note: 'Cố định: ' + f.name
      };
      transactions.push(tx);
      await saveData();

      render();
    };
  });
  listEl.querySelectorAll('.fixed-del').forEach(btn=>{
    btn.onclick = async ()=>{
      fixedExpenses = fixedExpenses.filter(f=>f.id!==btn.dataset.id);
      await saveFixedExpenses();
      render();
    };
  });
}

function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function shortDate(d){ return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
const WEEKDAY_VN = ['CN','T2','T3','T4','T5','T6','T7'];

function dailyBuckets(n){
  const out = [];
  const now = new Date();
  for(let i=n-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i);
    const key = ymd(d);
    const tx = transactions.filter(t=>t.date===key);
    const income = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    out.push({ key, d, label: shortDate(d), sub: WEEKDAY_VN[d.getDay()], income, expense, isToday: key===ymd(now) });
  }
  return out;
}

function weeklyBuckets(n){
  const out = [];
  const now = new Date();
  const day = now.getDay();
  const diffToMon = (day===0? -6 : 1-day);
  const curMonday = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diffToMon);
  for(let i=n-1;i>=0;i--){
    const start = new Date(curMonday.getFullYear(), curMonday.getMonth(), curMonday.getDate()-7*i);
    const end = new Date(start.getFullYear(), start.getMonth(), start.getDate()+6);
    const startKey = ymd(start), endKey = ymd(end);
    const tx = transactions.filter(t=>t.date>=startKey && t.date<=endKey);
    const income = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    out.push({ startKey, endKey, start, end, label:`${shortDate(start)} - ${shortDate(end)}`, income, expense, isCurrent: i===0 });
  }
  return out;
}

    const palette = ['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#888780','#639922','#BA7517'];

    render();

    const spent = spentByJar[j.id] || 0;

            <div style="font-size:12px;color:var(--ink-soft);">${j.pct}% thu nhập · ${fmt(allocated)}</div>

          <button class="jar-del" data-id="${j.id}" style="position:static;font-size:15px;color:var(--ink-soft);background:none;border:none;cursor:pointer;">✕</button>

          <span style="color:${over?'var(--expense)':'var(--ink-soft)'};">Đã chi: <b style="color:${over?'var(--expense)':'var(--ink)'};">${fmt(spent)}</b></span>
          <span style="color:${over?'var(--expense)':'var(--ink-soft)'};">${over?'⚠ Vượt '+fmt(spent-allocated):'Còn lại: '}<b style="color:${over?'var(--expense)':'var(--income)'};">${over?'':fmt(remaining)}</b></span>
        </div>
        <div style="display:flex;gap:4px;margin-top:10px;justify-content:center;">
          <button class="jar-pct-btn" data-id="${j.id}" data-delta="-5" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--ink-soft);">−5%</button>

        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.jar-del').forEach(btn=>{
    btn.onclick = async ()=>{
      jars = jars.filter(j=>j.id!==btn.dataset.id);
      await saveJars();
      render();
    };
  });
  grid.querySelectorAll('.jar-pct-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const j = jars.find(x=>x.id===btn.dataset.id);
      if(!j) return;
      j.pct = Math.max(1, Math.min(100, j.pct + parseInt(btn.dataset.delta)));
      await saveJars();
      render();
    };
  });
}

  document.getElementById('sheetTitle').textContent = 'Sửa giao dịch';
  document.getElementById('btnSave').textContent = 'Cập nhật';
  document.getElementById('fAmount').value = t.amount;
  document.getElementById('fNote').value = t.note || '';
  document.getElementById('fDate').value = t.date;
  updateTypeUI();
  buildCatGrid();
  buildWalletSelect();
  buildJarSelect();
  document.getElementById('overlay').classList.remove('hidden');
}

function buildWalletSelect(){
  const wrap = document.getElementById('walletSelect');
  if(!wallets.find(w=>w.id===currentWallet)) currentWallet = wallets[0].id;
  wrap.innerHTML = wallets.map(w=>`
    <button type="button" class="wallet-chip ${w.id===currentWallet?'active':''}" data-id="${w.id}">${w.icon} ${w.name}</button>
  `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentWallet = b.dataset.id; buildWalletSelect(); };
  });
}

function buildJarSelect(){
  const wrap = document.getElementById('jarSelect');
  const wrapOuter = document.getElementById('jarSelectWrap');
  if(currentType !== 'expense'){ wrapOuter.style.display='none'; return; }
  wrapOuter.style.display='';
  wrap.innerHTML = jarsByUsage().map(j=>`
      <button type="button" class="wallet-chip ${j.id===currentJar?'active':''}" data-id="${j.id}">${j.icon} ${j.name}</button>
    `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentJar = b.dataset.id; buildJarSelect(); };
  });
}

function closeSheet(){
  document.getElementById('overlay').classList.add('hidden');
  editingId = null;
}

function updateTypeUI(){
  document.getElementById('typeExpense').classList.toggle('active', currentType==='expense');
  document.getElementById('typeIncome').classList.toggle('active', currentType==='income');
  buildJarSelect();
}

function buildCatGrid(){
  const grid = document.getElementById('catGrid');
  const cats = allCats(currentType);
  if(!cats.find(c=>c.id===currentCat)) currentCat = cats[0].id;
  grid.innerHTML = cats.map(c=>`
    <button type="button" class="cat-btn ${c.id===currentCat?'active':''}" data-id="${c.id}">
      <span class="ic">${c.icon}</span>${c.name}
    </button>
  `).join('');
  grid.querySelectorAll('.cat-btn').forEach(b=>{
    b.onclick = ()=>{ currentCat = b.dataset.id; buildCatGrid(); };
  });
}

document.getElementById('fabAdd').onclick = openSheet;
document.getElementById('tabHome').onclick = ()=>{ currentTab='home'; render(); };
document.getElementById('tabJars').onclick = ()=>{ currentTab='jars'; render(); };
document.getElementById('tabAdd').onclick = ()=>{ currentTab='add'; render(); };
document.getElementById('tabDebts').onclick = ()=>{ currentTab='debts'; render(); };
document.getElementById('tabWallets').onclick = ()=>{ currentTab='wallets'; render(); };
document.getElementById('btnCancel').onclick = closeSheet;
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeSheet(); };

document.getElementById('typeExpense').onclick = ()=>{ currentType='expense'; updateTypeUI(); buildCatGrid(); };
document.getElementById('typeIncome').onclick = ()=>{ currentType='income'; updateTypeUI(); buildCatGrid(); };

async function commitTx(prefix){
  const amountEl = document.getElementById(prefix+'Amount');
  const dateEl = document.getElementById(prefix+'Date');
  const noteEl = document.getElementById(prefix+'Note');
  const amount = parseFloat(amountEl.value);
  const date = dateEl.value || todayStr();
  const note = noteEl.value.trim();
  if(!amount || amount <= 0){
    amountEl.focus();
    return false;
  }
  if(editingId){
    const idx = transactions.findIndex(t=>t.id===editingId);
    if(idx > -1){
      transactions[idx] = {
        ...transactions[idx],
        type: currentType,
        cat: currentCat,
        walletId: currentWallet,
        jarId: currentJar || '',
        amount: Math.round(amount),
        date,
        note
      };
    }
  } else {
    const tx = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      type: currentType,
      cat: currentCat,
      walletId: currentWallet,
      jarId: currentJar || '',
      amount: Math.round(amount),
      date,
      note
    };
    transactions.push(tx);
  }
  await saveData();
  return true;
}

document.getElementById('btnSave').onclick = async ()=>{
  const ok = await commitTx('f');
  if(ok){
    closeSheet();
    render();
  }
};

loadData();
</script>
