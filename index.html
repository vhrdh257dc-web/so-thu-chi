<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sổ Thu Chi</title>
<style>
  :root{
    --bg:#f6f5f1;
    --card:#ffffff;
    --ink:#1f2421;
    --ink-soft:#6b6f6a;
    --line:#e6e3da;
    --income:#1d9e75;
    --income-soft:#e1f5ee;
    --expense:#d85a30;
    --expense-soft:#faece7;
    --accent:#534ab7;
    --accent-soft:#eeedfe;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:calc(72px + env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    min-height:100vh;
    min-height:100dvh;
  }
  .wrap{max-width:520px;margin:0 auto;}
  h1{
    font-size:22px;
    font-weight:700;
    margin:4px 0 18px;
    letter-spacing:-0.3px;
  }
  .balance-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:14px;
  }
  .balance-label{font-size:13px;color:var(--ink-soft);margin-bottom:4px;}
  .balance-value{font-size:32px;font-weight:700;letter-spacing:-0.5px;}
  .balance-row{display:flex;gap:10px;margin-top:14px;}
  .mini{
    flex:1;
    border-radius:10px;
    padding:10px 12px;
  }
  .mini.income{background:var(--income-soft);}
  .mini.expense{background:var(--expense-soft);}
  .mini-label{font-size:12px;display:flex;align-items:center;gap:5px;}
  .mini.income .mini-label{color:var(--income);}
  .mini.expense .mini-label{color:var(--expense);}
  .mini-value{font-size:17px;font-weight:700;margin-top:2px;}
  .mini.income .mini-value{color:var(--income);}
  .mini.expense .mini-value{color:var(--expense);}

  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin:18px 0 10px;
  }
  .month-nav button{
    background:var(--card);border:1px solid var(--line);border-radius:8px;
    width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--ink);
  }
  .month-nav .month-label{font-weight:600;font-size:15px;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{font-size:14px;font-weight:600;margin:0 0 10px;color:var(--ink-soft);}

  .chart-wrap{position:relative;height:220px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:12.5px;color:var(--ink-soft);}
  .legend span.dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;}

  .tx-list{margin-top:4px;}
  .tx-empty{
    text-align:center;color:var(--ink-soft);font-size:14px;padding:30px 10px;
  }
  .tx-item{
    display:flex;align-items:center;gap:10px;
    padding:11px 0;border-bottom:1px solid var(--line);
  }
  .tx-item:last-child{border-bottom:none;}
  .tx-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }
  .tx-mid{flex:1;min-width:0;}
  .tx-cat{font-size:14.5px;font-weight:600;}
  .tx-note{font-size:12.5px;color:var(--ink-soft);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tx-right{text-align:right;flex-shrink:0;}
  .tx-amount{font-weight:700;font-size:14.5px;}
  .tx-amount.income{color:var(--income);}
  .tx-amount.expense{color:var(--expense);}
  .tx-date{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .tx-del{
    background:none;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;
    padding:2px 4px;margin-left:2px;line-height:1;
  }
  .tx-edit{
    background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;
    padding:2px 4px;margin-left:2px;line-height:1;
  }

  .fab{
    position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:50%;transform:translateX(260px);
    width:54px;height:54px;border-radius:50%;
    background:var(--ink);color:#fff;border:none;font-size:26px;
    cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,0.18);
    display:flex;align-items:center;justify-content:center;
    z-index:30;
  }
  @media (max-width:560px){
    .fab{right:calc(18px + env(safe-area-inset-right));transform:none;}
  }

  .tabbar{
    position:fixed;top:0;left:0;right:0;
    background:var(--card);border-bottom:1px solid var(--line);
    display:flex;justify-content:center;z-index:30;
    padding-top:env(safe-area-inset-top);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  .tabbar-inner{display:flex;width:100%;max-width:520px;overflow-x:auto;}
  .tab-btn{
    flex:1;background:none;border:none;padding:10px 2px 9px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;color:var(--ink-soft);cursor:pointer;min-width:58px;
  }
  .tab-btn .tic{font-size:18px;}
  .tab-btn.active{color:var(--ink);font-weight:600;border-bottom:2.5px solid var(--ink);}

  .cat-list-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:6px 16px;margin-bottom:14px;
  }
  .cat-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 0;border-bottom:1px solid var(--line);
  }
  .cat-row:last-child{border-bottom:none;}
  .cat-row .cat-ic{
    width:36px;height:36px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .cat-row .cat-info{flex:1;min-width:0;}
  .cat-row .cat-name{font-size:14.5px;font-weight:600;}
  .cat-row .cat-sum{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .cat-row .cat-total{font-size:14.5px;font-weight:700;flex-shrink:0;}
  .cat-row .cat-del{
    background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 2px;
  }
  .add-cat-card{
    background:var(--card);border:1.5px dashed var(--line);border-radius:var(--radius);
    padding:14px 16px;display:flex;gap:8px;align-items:center;margin-bottom:14px;
  }
  .add-cat-card input{flex:1;}
  .add-cat-card .ic-pick{width:54px;flex-shrink:0;text-align:center;}
  .section-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .section-toggle button{
    flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--card);font-size:13.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .section-toggle button.active.expense{background:var(--expense-soft);border-color:var(--expense);color:var(--expense);}
  .section-toggle button.active.income{background:var(--income-soft);border-color:var(--income);color:var(--income);}

  .wallet-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
  }
  .wallet-ic{
    width:42px;height:42px;border-radius:11px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:19px;
  }
  .wallet-info{flex:1;min-width:0;}
  .wallet-name{font-size:14.5px;font-weight:600;}
  .wallet-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .wallet-bal{font-size:16px;font-weight:700;flex-shrink:0;text-align:right;}
  .wallet-del{
    background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 0 2px 4px;
  }
  .wallet-edit{
    background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:2px 0 2px 4px;
  }
  .wallet-select{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .wallet-chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:10px;
    padding:8px 12px;font-size:13px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;
  }
  .wallet-chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600;}

  .debt-summary{display:flex;gap:10px;margin-bottom:14px;}
  .debt-sum-card{flex:1;border-radius:12px;padding:12px 14px;}
  .debt-sum-card.owe{background:var(--expense-soft);}
  .debt-sum-card.owed{background:var(--income-soft);}
  .debt-sum-label{font-size:12px;}
  .debt-sum-card.owe .debt-sum-label{color:var(--expense);}
  .debt-sum-card.owed .debt-sum-label{color:var(--income);}
  .debt-sum-value{font-size:17px;font-weight:700;margin-top:2px;}
  .debt-sum-card.owe .debt-sum-value{color:var(--expense);}
  .debt-sum-card.owed .debt-sum-value{color:var(--income);}

  .debt-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:12px;
  }
  .debt-top{display:flex;align-items:flex-start;gap:10px;}
  .debt-ic{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .debt-info{flex:1;min-width:0;}
  .debt-name{font-size:14.5px;font-weight:600;}
  .debt-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .debt-del{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;flex-shrink:0;}
  .debt-edit{background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;flex-shrink:0;padding:2px 4px;}
  .debt-progress{height:7px;border-radius:4px;background:var(--bg);margin:12px 0 6px;overflow:hidden;}
  .debt-progress-fill{height:100%;border-radius:4px;}
  .debt-nums{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);}
  .debt-nums b{color:var(--ink);font-weight:700;}
  .debt-pay-row{display:flex;gap:8px;margin-top:12px;}
  .debt-pay-row input{flex:1;}
  .debt-pay-row button{
    flex:0 0 auto;padding:0 14px;border-radius:10px;border:none;
    background:var(--ink);color:#fff;font-size:13px;font-weight:600;cursor:pointer;
  }
  .debt-paid-off{opacity:0.6;}

  .fixed-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
  }
  .fixed-ic{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .fixed-info{flex:1;min-width:0;}
  .fixed-name{font-size:14.5px;font-weight:600;}
  .fixed-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .fixed-amount{font-size:14.5px;font-weight:700;flex-shrink:0;text-align:right;}
  .fixed-actions{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .fixed-pay-btn{
    border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;
  }
  .fixed-pay-btn.unpaid{background:var(--expense-soft);color:var(--expense);}
  .fixed-pay-btn.paid{background:var(--income-soft);color:var(--income);}
  .fixed-log-btn{
    border:none;border-radius:8px;padding:6px 10px;font-size:11.5px;font-weight:600;cursor:pointer;
    background:var(--accent-soft);color:var(--accent);margin-top:4px;
  }
  .fixed-log-btn:disabled{background:var(--bg);color:var(--ink-soft);opacity:0.7;cursor:default;}
  .fixed-del{background:none;border:none;color:var(--ink-soft);font-size:14px;cursor:pointer;}
  .fixed-check-row{
    display:flex;align-items:center;gap:6px;cursor:pointer;
    padding:5px 9px;border-radius:8px;font-size:11.5px;font-weight:600;white-space:nowrap;
  }
  .fixed-check-row input[type="checkbox"]{width:15px;height:15px;flex-shrink:0;accent-color:var(--income);cursor:pointer;}
  .fixed-check-row.paid{background:var(--income-soft);color:var(--income);}
  .fixed-check-row.unpaid{background:var(--expense-soft);color:var(--expense);}
  .fixed-check-row.disabled{background:var(--bg);color:var(--ink-soft);opacity:0.7;cursor:default;}
  .fixed-check-row.disabled input[type="checkbox"]{cursor:default;accent-color:var(--ink-soft);}
  .fixed-status-btn{
    border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .fixed-status-btn.paid{background:var(--income-soft);color:var(--income);}
  .fixed-status-btn.unpaid{background:var(--expense-soft);color:var(--expense);}

  .jar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .jar-item{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 10px 12px;text-align:center;position:relative;
  }
  .jar-emoji{font-size:26px;display:block;margin-bottom:6px;}
  .jar-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3;}
  .jar-pct{font-size:20px;font-weight:700;margin:4px 0 2px;}
  .jar-amount{font-size:11.5px;color:var(--ink-soft);}
  .jar-del{
    position:absolute;top:6px;right:6px;
    background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;padding:0;
  }
  .jar-total-row{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
  }
  .jar-total-row .label{font-size:13px;color:var(--ink-soft);}
  .jar-total-row .val{font-size:15px;font-weight:700;}
  .jar-total-row .val.ok{color:var(--income);}
  .jar-total-row .val.over{color:var(--expense);}
  .pct-bar{height:8px;border-radius:4px;background:var(--bg);overflow:hidden;margin-bottom:14px;}
  .pct-bar-fill{height:100%;border-radius:4px;transition:width .3s;}

  .jar-base-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .jar-base-toggle button{
    flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .jar-base-toggle button.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}

  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.35);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--card);width:100%;max-width:520px;
    border-radius:18px 18px 0 0;padding:20px 18px calc(26px + env(safe-area-inset-bottom));
    max-height:88vh;overflow-y:auto;
  }
  .sheet h2{margin:0 0 14px;font-size:17px;}
  .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .type-toggle button{
    flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--card);font-size:14px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .type-toggle button.active.expense{background:var(--expense-soft);border-color:var(--expense);color:var(--expense);}
  .type-toggle button.active.income{background:var(--income-soft);border-color:var(--income);color:var(--income);}

  label{font-size:12.5px;color:var(--ink-soft);display:block;margin:12px 0 5px;}
  input[type=number],input[type=text],input[type=date]{
    width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);
    font-size:16px;background:var(--bg);color:var(--ink);
  }
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px;}
  .cat-btn{
    border:1.5px solid var(--line);background:var(--card);border-radius:10px;
    padding:9px 4px;font-size:11.5px;cursor:pointer;text-align:center;color:var(--ink-soft);
  }
  .cat-btn .ic{font-size:18px;display:block;margin-bottom:3px;}
  .cat-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600;}

  .sheet-actions{display:flex;gap:10px;margin-top:20px;}
  .checkbox-row{
    display:flex;align-items:center;gap:8px;margin:14px 0 0;
    padding:10px 12px;border-radius:10px;background:var(--bg);
    font-size:13.5px;color:var(--ink);cursor:pointer;
  }
  .checkbox-row input[type="checkbox"]{width:17px;height:17px;flex-shrink:0;accent-color:var(--accent);cursor:pointer;}
  .btn{
    flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:600;cursor:pointer;
  }
  .btn.cancel{background:var(--bg);color:var(--ink-soft);border:1px solid var(--line);}
  .btn.save{background:var(--ink);color:#fff;}
  .loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:14px;}
  .money-row{display:flex;gap:8px;align-items:stretch;}
  .money-row input{flex:1;}
  .btn-000{
    flex:0 0 auto;border:1px solid var(--line);background:var(--bg);border-radius:10px;
    padding:0 14px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;
  }
  .btn-000:active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;}
  .top-row h1{margin:0;}
  .btn-export{
    border:1px solid var(--line);background:var(--card);border-radius:9px;
    padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;
    display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;
  }
  .btn-export:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
<div class="tabbar">
  <div class="tabbar-inner">
    <button class="tab-btn active" id="tabHome" data-tab="home">
      <span class="tic">🏠</span>Tổng quan
    </button>
    <button class="tab-btn" id="tabJars" data-tab="jars">
      <span class="tic">📊</span>Phân tích
    </button>
    <button class="tab-btn" id="tabAdd" data-tab="add">
      <span class="tic">➕</span>Ghi thu chi
    </button>
    <button class="tab-btn" id="tabDebts" data-tab="debts">
      <span class="tic">💰</span>Ngân sách
    </button>
    <button class="tab-btn" id="tabWallets" data-tab="wallets">
      <span class="tic">🗂️</span>Khác
    </button>
  </div>
</div>
<div id="app">
  <div class="loading" id="loading">Đang tải dữ liệu…</div>
</div>
</div>

<button class="fab" id="fabAdd" style="display:none;">+</button>

<div class="overlay hidden" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">Thêm giao dịch</h2>
    <div class="type-toggle">
      <button type="button" id="typeExpense" class="active expense">Chi tiền</button>
      <button type="button" id="typeIncome" class="income">Thu tiền</button>
    </div>

    <label>Số tiền (đ)</label>
    <div class="money-row">
      <input type="number" id="fAmount" inputmode="numeric" placeholder="0">
      <button type="button" class="btn-000" data-target="fAmount">000</button>
    </div>

    <label>Ví / Tài khoản</label>
    <div class="wallet-select" id="walletSelect"></div>

    <label>Danh mục</label>
    <div class="cat-grid" id="catGrid"></div>

    <label>Ngày</label>
    <input type="date" id="fDate">

    <label>Ghi chú (tuỳ chọn)</label>
    <input type="text" id="fNote" placeholder="VD: Ăn trưa với bạn">

    <div id="jarSelectWrap" style="display:none;">
      <label>Tính vào lọ (tuỳ chọn)</label>
      <div class="wallet-select" id="jarSelect"></div>
    </div>

    <div class="sheet-actions">
      <button class="btn cancel" id="btnCancel">Huỷ</button>
      <button class="btn save" id="btnSave">Lưu</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>

function monthsBack(n){
  // trả về mảng n tháng gần nhất TRƯỚC tháng hiện tại (cũ -> mới), không gồm tháng này
  const arr = [];
  const now = new Date();
  for(let i=n;i>=1;i--){
    arr.push(monthKey(new Date(now.getFullYear(), now.getMonth()-i, 1)));
  }
  return arr;
}

function allCats(type){

}
function findCat(id){
  return allCats('expense').find(c=>c.id===id) || allCats('income').find(c=>c.id===id) || {name:'Khác',icon:'•••',color:'#888'};
}

async function loadData(){
  try{
    const snap = await db.ref('sothuchu').once('value');
    const d = snap.val() || {};
    transactions   = d.transactions   ? Object.values(d.transactions)   : [];
    categories     = d.categories     ? d.categories : JSON.parse(JSON.stringify(DEFAULT_CATS));
    wallets        = d.wallets        ? Object.values(d.wallets)        : [
      { id:'cash', name:'Tiền mặt', icon:'💵', color:'#1D9E75', initialBalance:0, builtin:true },
      { id:'bank', name:'Tài khoản ngân hàng', icon:'🏦', color:'#378ADD', initialBalance:0, builtin:true },
    ];
    debts          = d.debts          ? Object.values(d.debts)          : [];
    fixedExpenses  = d.fixedExpenses  ? Object.values(d.fixedExpenses)  : [];
    savings        = d.savings        ? Object.values(d.savings)        : [];
    jars           = d.jars           ? Object.values(d.jars)           : JSON.parse(JSON.stringify(DEFAULT_JARS));
  }catch(e){
    console.error('Firebase load error', e);
    categories = JSON.parse(JSON.stringify(DEFAULT_CATS));
    jars = JSON.parse(JSON.stringify(DEFAULT_JARS));
  }
  // di dân dữ liệu cũ: thêm danh mục "Tiết kiệm/Hụi" nếu chưa có
  if(categories.expense && !categories.expense.find(c=>c.id==='tiet_kiem')){
    categories.expense.push({id:'tiet_kiem', name:'Tiết kiệm/Hụi', icon:'🐷', color:'#639922'});
  }
  if(categories.income && !categories.income.find(c=>c.id==='nhan_tk')){
    categories.income.push({id:'nhan_tk', name:'Nhận tiết kiệm/hụi', icon:'🐷', color:'#639922'});
  }
  // di dân dữ liệu tiết kiệm/hụi cũ (dạng mảng contributions/interestLog) sang mô hình số tháng
  savings.forEach(s=>{
    if(s.contributions !== undefined || s.interestLog !== undefined){
      const monthsFromArr = (s.contributions||[]).length;
      if(typeof s.monthsPaid !== 'number') s.monthsPaid = monthsFromArr;
      delete s.contributions;
      delete s.interestLog;
    }
    if(typeof s.monthsPaid !== 'number') s.monthsPaid = 0;
    if(typeof s.monthsTotal !== 'number') s.monthsTotal = 0;
  });
  render();
}

// helpers: store arrays as objects keyed by item.id for Firebase
const toObj = arr => {
  const o = {};
  arr.forEach(item => { o[item.id] = item; });
  return o;
};

function ensureJarById(id, name, icon, color){
  let j = jars.find(x=>x.id===id);
  if(!j){
    j = { id, name, icon, pct: 0, color };
    jars.push(j);
  }
  return j;
}

function findWallet(id){
  return wallets.find(w=>w.id===id) || wallets[0] || { name:'Ví', icon:'👛', color:'#888' };
}

function walletBalance(id){
  const w = findWallet(id);
  const anchor = w.balanceAsOf || '0000-01-01';
  const tx = transactions.filter(t=> (t.walletId || 'cash') === id && t.date >= anchor);
  const income = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return (w.initialBalance||0) + income - expense;
}

function monthTx(){
  const mk = monthKey(viewMonth);
  return transactions.filter(t => t.date.slice(0,7) === mk);
}

function csvEscape(v){
  const s = String(v==null?'':v);
  if(/[",\n;]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function exportReport(mtx){
  // mtx: giao dịch của tháng đang xem (nếu có), export toàn bộ lịch sử kèm tổng hợp tháng hiện tại
  const all = transactions.slice().sort((a,b)=> a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  const rows = [];

  rows.push([`Báo cáo Sổ Thu Chi — xuất ngày ${todayStr()}`]);
  rows.push([]);
  rows.push([`Tổng hợp ${monthLabel(viewMonth)}`]);
  const mIncome = (mtx||[]).filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExpense = (mtx||[]).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  rows.push(['Tổng thu', mIncome]);
  rows.push(['Tổng chi', mExpense]);
  rows.push(['Chênh lệch', mIncome - mExpense]);
  rows.push(['Tổng số dư tất cả ví', wallets.reduce((s,w)=> s + walletBalance(w.id), 0)]);
  rows.push([]);
  rows.push(['Chi tiết toàn bộ giao dịch']);
  rows.push(['Ngày','Loại','Danh mục','Ví / Tài khoản','Số tiền','Ghi chú']);
  all.forEach(t=>{
    const cat = findCat(t.cat);
    const wallet = findWallet(t.walletId || 'cash');
    rows.push([
      t.date,
      t.type==='income' ? 'Thu' : 'Chi',
      cat.name,
      wallet.name,
      t.amount,
      t.note || ''
    ]);
  });

  const csv = rows.map(r => r.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `so-thu-chi_bao-cao_${todayStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function wireThousandButtons(){
  document.querySelectorAll('.btn-000').forEach(btn=>{
    btn.onclick = ()=>{
      const inp = document.getElementById(btn.dataset.target);
      if(!inp) return;
      const cur = (inp.value||'').toString();
      inp.value = cur + '000';
      inp.dispatchEvent(new Event('input', {bubbles:true}));
      inp.focus();
    };
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderPie(mtx){
  const exp = mtx.filter(t=>t.type==='expense');
  const byCat = {};
  exp.forEach(t=>{ byCat[t.cat] = (byCat[t.cat]||0) + t.amount; });
  const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);

  const legend = document.getElementById('pieLegend');
  if(entries.length === 0){
    legend.innerHTML = `<span style="color:var(--ink-soft);">Chưa có khoản chi nào tháng này</span>`;
  } else {
    legend.innerHTML = entries.map(([id,val])=>{
      const cat = findCat(id);
      const pct = total ? Math.round(val/total*100) : 0;
      return `<span><span class="dot" style="background:${cat.color};"></span>${cat.icon} ${cat.name} ${pct}%</span>`;
    }).join('');
  }

  if(pieChart) pieChart.destroy();
  const ctx = document.getElementById('pieCanvas');
  if(entries.length === 0){
    pieChart = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:['Chưa có dữ liệu'], datasets:[{ data:[1], backgroundColor:['#e6e3da'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{enabled:false}} }
    });
    return;
  }
  pieChart = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels: entries.map(([id])=>findCat(id).name),
      datasets:[{
        data: entries.map(([,v])=>v),
        backgroundColor: entries.map(([id])=>findCat(id).color),
        borderColor: '#ffffff',
        borderWidth: 2,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{ callbacks:{ label: (c)=> ` ${c.label}: ${fmt(c.parsed)}` } }
      }
    }
  });
}

function renderBar(){
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(viewMonth.getFullYear(), viewMonth.getMonth()-i, 1);
    months.push(d);
  }
  const labels = months.map(d=>`Th${d.getMonth()+1}`);
  const incomeData = months.map(d=>{
    const mk = monthKey(d);
    return transactions.filter(t=>t.type==='income' && t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
  });
  const expenseData = months.map(d=>{
    const mk = monthKey(d);
    return transactions.filter(t=>t.type==='expense' && t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
  });

  if(barChart) barChart.destroy();
  const ctx = document.getElementById('barCanvas');
  barChart = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Thu', data:incomeData, backgroundColor:'#1D9E75', borderRadius:4, maxBarThickness:18 },
        { label:'Chi', data:expenseData, backgroundColor:'#D85A30', borderRadius:4, maxBarThickness:18 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{
        y:{ beginAtZero:true, ticks:{ callback:(v)=> (v/1000)+'k', color:'#898781' }, grid:{ color:'#e6e3da' } },
        x:{ grid:{ display:false }, ticks:{ color:'#898781' } }
      },
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{ label:(c)=> ` ${c.dataset.label}: ${fmt(c.parsed.y)}` } }
      }
    }
  });
}

function editDebt(id){
  const d = debts.find(x=>x.id===id);
  if(!d) return;

  const name = prompt('Tên khoản nợ:', d.name);
  if(name === null) return;

  const typeKeys = Object.keys(DEBT_TYPES);
  const typeList = typeKeys.map(k=>`${k}=${DEBT_TYPES[k].name}`).join(', ');
  const typeInput = prompt(`Loại khoản nợ (${typeList}):`, d.type);
  if(typeInput === null) return;
  const finalType = typeKeys.includes(typeInput.trim()) ? typeInput.trim() : d.type;

  const total = prompt('Tổng số tiền (đ):', d.total);
  if(total === null) return;

  const paid = prompt('Đã trả (đ):', d.paid);
  if(paid === null) return;

  const dueDayInput = prompt('Ngày đến hạn hàng tháng (1-28):', d.dueDay || 1);
  if(dueDayInput === null) return;

  const isInstallment = finalType==='tra_gop' || finalType==='the_tin_dung';
  let months = d.months || 0;
  if(isInstallment){
    const m = prompt('Số tháng trả góp:', d.months || 0);
    if(m === null) return;
    months = Math.max(0, Math.round(parseFloat(m) || 0));
  } else {
    months = 0;
  }

  const newTotal = Math.max(0, Math.round(parseFloat(total) || d.total));
  d.name = name.trim() || d.name;
  d.type = finalType;
  d.total = newTotal;
  d.paid = Math.min(newTotal, Math.max(0, Math.round(parseFloat(paid) || 0)));
  d.dueDay = Math.min(28, Math.max(1, Math.round(parseFloat(dueDayInput) || d.dueDay || 1)));
  d.months = months;

  saveDebts().then(render);
}

      id, name, icon: svIcons[svIconIdx], monthlyAmount: amount,

          </div>

            ${isDone||f.received?'Đã xong ✓':'+1 tháng'}

        ${f.received ? `

          ✓ Đã nhận tiền (${fmt((f.monthlyAmount||0)*(f.monthsTotal||0))})

    };

  listEl.querySelectorAll('.sv-edit').forEach(btn=>{
    btn.onclick = ()=> editSavingPlan(btn.dataset.id);

  });

  listEl.querySelectorAll('.sv-receive-btn').forEach(btn=>{

  });

async function receiveSavingPayout(id){
  const f = savings.find(x=>x.id===id);
  if(!f || !(f.monthsTotal>0) || f.received) return;

  const walletSel = document.getElementById('recvWallet-'+id);
  const walletId = walletSel ? walletSel.value : (wallets[0] && wallets[0].id);
  const totalPool = (f.monthlyAmount||0) * f.monthsTotal;
  const monthsPaid = f.monthsPaid || 0;
  const monthsRemaining = Math.max(0, f.monthsTotal - monthsPaid);
  const remainingAmount = monthsRemaining * (f.monthlyAmount||0);

  const confirmMsg = `Xác nhận nhận ${fmt(totalPool)} vào ví đã chọn?` +
    (monthsRemaining>0 ? `\nBạn còn thiếu ${monthsRemaining} tháng (${fmt(remainingAmount)}), số này sẽ được chuyển thành khoản nợ trả góp.` : '');
  if(!confirm(confirmMsg)) return;

  // 1. Ghi nhận khoản thu nhận tiền hụi/tiết kiệm
  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    type: 'income', cat: 'nhan_tk', walletId,
    amount: totalPool, date: todayStr(),
    note: `Nhận tiền hụi/tiết kiệm: ${f.name}`
  });
  await saveData();

  // 2. Nếu chưa đóng đủ tháng, chuyển phần còn thiếu thành khoản nợ trả góp (cộng dồn nếu đã có)
  if(monthsRemaining > 0){
    let debt = debts.find(d=>d.sourceSavingId === f.id);
    if(debt){
      debt.total = (debt.total||0) + remainingAmount;
      debt.months = (debt.months||0) + monthsRemaining;
    } else {
      debt = {
        id: 'd_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
        name: 'Hụi (trả góp): ' + f.name,
        type: 'tra_gop', direction: 'toi_no',
        total: remainingAmount, paid: 0,
        dueDay: f.dueDay || 1, months: monthsRemaining, paidMonths: [],
        sourceSavingId: f.id
      };
      debts.push(debt);
    }
    await saveDebts();
  }

  // 3. Đánh dấu khoản tiết kiệm/hụi đã nhận tiền
  f.received = true;
  f.monthsPaid = f.monthsTotal;
  await saveSavings();

  render();
}

async function contributeSavingMonth(id){
  const f = savings.find(x=>x.id===id);
  if(!f) return;
  if(f.monthsTotal > 0 && (f.monthsPaid||0) >= f.monthsTotal) return;
  f.monthsPaid = (f.monthsPaid||0) + 1;
  await saveSavings();
  ensureJarById('jar_savings', 'Tiết kiệm & Hụi', '🐷', '#639922');
  await saveJars();
  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    type: 'expense', cat: 'tiet_kiem', walletId: f.walletId, amount: f.monthlyAmount,
    date: todayStr(), note: `Góp tiết kiệm/hụi: ${f.name} (tháng ${f.monthsPaid})`,
    jarId: 'jar_savings'
  });
  await saveData();
  render();
}

function editSavingPlan(id){
  const f = savings.find(x=>x.id===id);
  if(!f) return;

  const name = prompt('Tên khoản:', f.name);
  if(name === null) return;

  const amt = prompt('Số tiền đóng mỗi tháng (đ):', f.monthlyAmount);
  if(amt === null) return;

  const pct = prompt('Lãi suất mỗi tháng (%):', f.interestPct || 0);
  if(pct === null) return;

  const paid = prompt('Số tháng đã đóng:', f.monthsPaid || 0);
  if(paid === null) return;

  const total = prompt('Số tháng phải đóng (0 nếu không có kỳ hạn):', f.monthsTotal || 0);
  if(total === null) return;

  f.name = name.trim() || f.name;
  f.monthlyAmount = Math.round(parseFloat(amt) || f.monthlyAmount);
  f.interestPct = parseFloat(pct) || 0;
  f.monthsPaid = Math.max(0, Math.round(parseFloat(paid) || 0));
  f.monthsTotal = Math.max(0, Math.round(parseFloat(total) || 0));
  saveSavings().then(render);
}

      await saveFixedExpenses();
      render();
    };
  });

        <div class="mini expense">
          <div class="mini-label">↑ Đã chi (có gắn lọ)</div>
          <div class="mini-value">${fmt(totalSpent)}</div>
        </div>
        <div class="mini income">
          <div class="mini-label">↓ Còn lại</div>
          <div class="mini-value">${fmt(Math.max(0, totalIncome - totalSpent))}</div>
        </div>
      </div>
    </div>

    <div class="jar-total-row">
      <div class="label">Tổng % phân bổ</div>
      <div class="val ${totalPct===100?'ok':totalPct>100?'over':''}">${totalPct}% ${totalPct===100?'✓':totalPct>100?'⚠ Quá 100%':'— Còn '+(100-totalPct)+'%'}</div>
    </div>
    <div class="pct-bar"><div class="pct-bar-fill" style="width:${Math.min(100,totalPct)}%;background:${totalPct>100?'#D85A30':totalPct===100?'#1D9E75':'#378ADD'};"></div></div>

    <div id="jarGrid"></div>

    <div class="card">
      <h2>Thêm lọ mới</h2>
      <label>Tên lọ</label>
      <input type="text" id="jarName" placeholder="VD: Quỹ khẩn cấp">
      <label>Tỉ lệ (%)</label>
      <input type="number" id="jarPct" placeholder="VD: 10" min="1" max="100">
      <label>Icon (bấm để đổi)</label>
      <div style="font-size:28px;cursor:pointer;padding:8px 0;" id="jarIconPick">🏺</div>
      <div class="sheet-actions" style="margin-top:8px;">
        <button class="btn save" id="btnAddJar" style="flex:1;">Thêm lọ</button>
      </div>
    </div>
  `;

  const jarIcons = ['🏺','💰','📈','🎉','📚','🤝','🐷','🏠','🚗','✈️','🎓','💊','🎯','🌱','🎨','🔧'];
  let jarIconIdx = 0;
  document.getElementById('jarIconPick').onclick = ()=>{
    jarIconIdx = (jarIconIdx+1) % jarIcons.length;
    document.getElementById('jarIconPick').textContent = jarIcons[jarIconIdx];
  };

  document.getElementById('btnAddJar').onclick = async ()=>{
    const name = document.getElementById('jarName').value.trim();
    const pct = Math.round(parseFloat(document.getElementById('jarPct').value)||0);
    if(!name || pct <= 0){ return; }
    const palette = ['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#888780','#639922','#BA7517'];
    const color = palette[jars.length % palette.length];
    jars.push({ id:'jar_'+Date.now().toString(36), name, icon: jarIcons[jarIconIdx], pct, color });
    await saveJars();
    render();
  };

  const grid = document.getElementById('jarGrid');
  grid.innerHTML = jars.map(j=>{
    const allocated = Math.round(totalIncome * j.pct / 100);
    const spent = spentByJar[j.id] || 0;
    const remaining = Math.max(0, allocated - spent);
    const pctSpent = allocated > 0 ? Math.min(100, Math.round(spent / allocated * 100)) : 0;
    const over = spent > allocated;
    return `
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:38px;height:38px;border-radius:10px;background:${j.color}22;color:${j.color};display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;">${j.icon}</div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:14.5px;">${escapeHtml(j.name)}</div>
            <div style="font-size:12px;color:var(--ink-soft);">${j.pct}% thu nhập · ${fmt(allocated)}</div>
          </div>
          <button class="jar-del" data-id="${j.id}" style="position:static;font-size:15px;color:var(--ink-soft);background:none;border:none;cursor:pointer;">✕</button>
        </div>
        <div style="height:7px;border-radius:4px;background:var(--bg);overflow:hidden;margin-bottom:8px;">
          <div style="height:100%;border-radius:4px;width:${pctSpent}%;background:${over?'#D85A30':j.color};transition:width .3s;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12.5px;">
          <span style="color:${over?'var(--expense)':'var(--ink-soft)'};">Đã chi: <b style="color:${over?'var(--expense)':'var(--ink)'};">${fmt(spent)}</b></span>
          <span style="color:${over?'var(--expense)':'var(--ink-soft)'};">${over?'⚠ Vượt '+fmt(spent-allocated):'Còn lại: '}<b style="color:${over?'var(--expense)':'var(--income)'};">${over?'':fmt(remaining)}</b></span>
        </div>
        <div style="display:flex;gap:4px;margin-top:10px;justify-content:center;">
          <button class="jar-pct-btn" data-id="${j.id}" data-delta="-5" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--ink-soft);">−5%</button>
          <button class="jar-pct-btn" data-id="${j.id}" data-delta="-1" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--ink-soft);">−1%</button>
          <span style="font-size:15px;font-weight:700;color:${j.color};padding:0 6px;line-height:1.8;">${j.pct}%</span>
          <button class="jar-pct-btn" data-id="${j.id}" data-delta="1" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--ink-soft);">+1%</button>
          <button class="jar-pct-btn" data-id="${j.id}" data-delta="5" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--ink-soft);">+5%</button>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.jar-del').forEach(btn=>{
    btn.onclick = async ()=>{
      jars = jars.filter(j=>j.id!==btn.dataset.id);
      await saveJars();
      render();
    };
  });
  grid.querySelectorAll('.jar-pct-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const j = jars.find(x=>x.id===btn.dataset.id);
      if(!j) return;
      j.pct = Math.max(1, Math.min(100, j.pct + parseInt(btn.dataset.delta)));
      await saveJars();
      render();
    };
  });
}

  app.innerHTML = `
    <h1>➕ Ghi thu chi</h1>

    <div class="card">
      <div class="type-toggle">
        <button type="button" id="aTypeExpense" class="active expense">Chi tiền</button>
        <button type="button" id="aTypeIncome" class="income">Thu tiền</button>
      </div>

      <label>Số tiền (đ)</label>
      <div class="money-row">
        <input type="number" id="aAmount" inputmode="numeric" placeholder="0">
        <button type="button" class="btn-000" data-target="aAmount">000</button>
      </div>

      <label>Ví / Tài khoản</label>
      <div class="wallet-select" id="aWalletSelect"></div>

      <label>Danh mục</label>
      <div class="cat-grid" id="aCatGrid"></div>

      <label>Ngày</label>
      <input type="date" id="aDate">

      <label>Ghi chú (tuỳ chọn)</label>
      <input type="text" id="aNote" placeholder="VD: Ăn trưa với bạn">

      <div id="aJarSelectWrap" style="display:none;">
        <label>Tính vào lọ (tuỳ chọn)</label>
        <div class="wallet-select" id="aJarSelect"></div>
      </div>

      <div class="sheet-actions">
        <button class="btn save" id="aBtnSave" style="flex:1;">Lưu giao dịch</button>
      </div>
    </div>

    <div class="card">
      <h2>Dữ liệu đã ghi (${allTx.length})</h2>
      <div class="tx-list" id="aTxList"></div>
    </div>
  `;

  currentType = 'expense';
  currentCat = categories.expense[0].id;
  currentWallet = wallets[0] ? wallets[0].id : 'cash';
  currentJar = '';
  editingId = null;

  document.getElementById('aDate').value = todayStr();
  updateAddTypeUI();
  buildAddCatGrid();
  buildAddWalletSelect();
  buildAddJarSelect();

  document.getElementById('aTypeExpense').onclick = ()=>{ currentType='expense'; updateAddTypeUI(); buildAddCatGrid(); };
  document.getElementById('aTypeIncome').onclick = ()=>{ currentType='income'; updateAddTypeUI(); buildAddCatGrid(); };

  document.getElementById('aBtnSave').onclick = async ()=>{
    const ok = await commitTx('a');
    if(ok) render();
  };

  renderTxList(allTx, 'aTxList');
}

function updateAddTypeUI(){
  document.getElementById('aTypeExpense').classList.toggle('active', currentType==='expense');
  document.getElementById('aTypeIncome').classList.toggle('active', currentType==='income');
  buildAddJarSelect();
}

function buildAddCatGrid(){
  const grid = document.getElementById('aCatGrid');
  const cats = allCats(currentType);
  if(!cats.find(c=>c.id===currentCat)) currentCat = cats[0].id;
  grid.innerHTML = cats.map(c=>`
    <button type="button" class="cat-btn ${c.id===currentCat?'active':''}" data-id="${c.id}">
      <span class="ic">${c.icon}</span>${c.name}
    </button>
  `).join('');
  grid.querySelectorAll('.cat-btn').forEach(b=>{
    b.onclick = ()=>{ currentCat = b.dataset.id; buildAddCatGrid(); };
  });
}

function buildAddWalletSelect(){
  const wrap = document.getElementById('aWalletSelect');
  if(!wallets.find(w=>w.id===currentWallet)) currentWallet = wallets[0].id;
  wrap.innerHTML = wallets.map(w=>`
    <button type="button" class="wallet-chip ${w.id===currentWallet?'active':''}" data-id="${w.id}">${w.icon} ${w.name}</button>
  `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentWallet = b.dataset.id; buildAddWalletSelect(); };
  });
}

function buildAddJarSelect(){
  const wrap = document.getElementById('aJarSelect');
  const wrapOuter = document.getElementById('aJarSelectWrap');
  if(currentType !== 'expense'){ wrapOuter.style.display='none'; return; }
  wrapOuter.style.display='';
  wrap.innerHTML = `<button type="button" class="wallet-chip ${currentJar===''?'active':''}" data-id="">Không chọn</button>` +
    jars.map(j=>`
      <button type="button" class="wallet-chip ${j.id===currentJar?'active':''}" data-id="${j.id}">${j.icon} ${j.name}</button>
    `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentJar = b.dataset.id; buildAddJarSelect(); };
  });
}

function deleteTx(id){
  transactions = transactions.filter(t=>t.id!==id);
  saveData();
  render();
}

function openSheet(){
  editingId = null;
  currentType = 'expense';
  currentJar = '';
  currentWallet = wallets[0] ? wallets[0].id : 'cash';
  currentCat = categories.expense[0].id;
  document.getElementById('sheetTitle').textContent = 'Thêm giao dịch';
  document.getElementById('btnSave').textContent = 'Lưu';
  document.getElementById('fAmount').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fDate').value = todayStr();
  updateTypeUI();
  buildCatGrid();
  buildWalletSelect();
  buildJarSelect();
  document.getElementById('overlay').classList.remove('hidden');
}

function editTx(id){
  const t = transactions.find(x=>x.id===id);
  if(!t) return;
  editingId = id;
  currentType = t.type;
  currentCat = t.cat;
  currentWallet = t.walletId || 'cash';
  currentJar = t.jarId || '';
  document.getElementById('sheetTitle').textContent = 'Sửa giao dịch';
  document.getElementById('btnSave').textContent = 'Cập nhật';
  document.getElementById('fAmount').value = t.amount;
  document.getElementById('fNote').value = t.note || '';
  document.getElementById('fDate').value = t.date;
  updateTypeUI();
  buildCatGrid();
  buildWalletSelect();
  buildJarSelect();
  document.getElementById('overlay').classList.remove('hidden');
}

function buildWalletSelect(){
  const wrap = document.getElementById('walletSelect');
  if(!wallets.find(w=>w.id===currentWallet)) currentWallet = wallets[0].id;
  wrap.innerHTML = wallets.map(w=>`
    <button type="button" class="wallet-chip ${w.id===currentWallet?'active':''}" data-id="${w.id}">${w.icon} ${w.name}</button>
  `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentWallet = b.dataset.id; buildWalletSelect(); };
  });
}

function buildJarSelect(){
  const wrap = document.getElementById('jarSelect');
  const wrapOuter = document.getElementById('jarSelectWrap');
  if(currentType !== 'expense'){ wrapOuter.style.display='none'; return; }
  wrapOuter.style.display='';
  wrap.innerHTML = `<button type="button" class="wallet-chip ${currentJar===''?'active':''}" data-id="">Không chọn</button>` +
    jars.map(j=>`
      <button type="button" class="wallet-chip ${j.id===currentJar?'active':''}" data-id="${j.id}">${j.icon} ${j.name}</button>
    `).join('');
  wrap.querySelectorAll('.wallet-chip').forEach(b=>{
    b.onclick = ()=>{ currentJar = b.dataset.id; buildJarSelect(); };
  });
}

function closeSheet(){
  document.getElementById('overlay').classList.add('hidden');
  editingId = null;
}

function updateTypeUI(){
  document.getElementById('typeExpense').classList.toggle('active', currentType==='expense');
  document.getElementById('typeIncome').classList.toggle('active', currentType==='income');
  buildJarSelect();
}

function buildCatGrid(){
  const grid = document.getElementById('catGrid');
  const cats = allCats(currentType);
  if(!cats.find(c=>c.id===currentCat)) currentCat = cats[0].id;
  grid.innerHTML = cats.map(c=>`
    <button type="button" class="cat-btn ${c.id===currentCat?'active':''}" data-id="${c.id}">
      <span class="ic">${c.icon}</span>${c.name}
    </button>
  `).join('');
  grid.querySelectorAll('.cat-btn').forEach(b=>{
    b.onclick = ()=>{ currentCat = b.dataset.id; buildCatGrid(); };
  });
}

document.getElementById('fabAdd').onclick = openSheet;
document.getElementById('tabHome').onclick = ()=>{ currentTab='home'; render(); };
document.getElementById('tabJars').onclick = ()=>{ currentTab='jars'; render(); };
document.getElementById('tabAdd').onclick = ()=>{ currentTab='add'; render(); };
document.getElementById('tabDebts').onclick = ()=>{ currentTab='debts'; render(); };
document.getElementById('tabWallets').onclick = ()=>{ currentTab='wallets'; render(); };
document.getElementById('btnCancel').onclick = closeSheet;
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeSheet(); };

document.getElementById('typeExpense').onclick = ()=>{ currentType='expense'; updateTypeUI(); buildCatGrid(); };
document.getElementById('typeIncome').onclick = ()=>{ currentType='income'; updateTypeUI(); buildCatGrid(); };

async function commitTx(prefix){
  const amountEl = document.getElementById(prefix+'Amount');
  const dateEl = document.getElementById(prefix+'Date');
  const noteEl = document.getElementById(prefix+'Note');
  const amount = parseFloat(amountEl.value);
  const date = dateEl.value || todayStr();
  const note = noteEl.value.trim();
  if(!amount || amount <= 0){
    amountEl.focus();
    return false;
  }
  if(editingId){
    const idx = transactions.findIndex(t=>t.id===editingId);
    if(idx > -1){
      transactions[idx] = {
        ...transactions[idx],
        type: currentType,
        cat: currentCat,
        walletId: currentWallet,
        jarId: currentJar || '',
        amount: Math.round(amount),
        date,
        note
      };
    }
  } else {
    const tx = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
      type: currentType,
      cat: currentCat,
      walletId: currentWallet,
      jarId: currentJar || '',
      amount: Math.round(amount),
      date,
      note
    };
    transactions.push(tx);
  }
  await saveData();
  return true;
}

document.getElementById('btnSave').onclick = async ()=>{
  const ok = await commitTx('f');
  if(ok){
    closeSheet();
    render();
  }
};

loadData();
</script>
